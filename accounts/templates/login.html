{% load static %}
<!doctype html>
<html>
  <head>
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}" />
  </head>
  <body>
    <form method="POST" action="{% url 'do_login' %}" class="auth-container">
    {% comment %} <form action="{% url 'do_login' %}" method="POST" class="auth-container"> {% endcomment %}
      {% csrf_token %}

      {% comment %} <a href="{% url 'home' %}" class="close-btn1">✖</a> {% endcomment %}

      <h2>Login</h2>

      <div class="input-group">
        <label>Username</label>
        <input type="text" name="username" required />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" required />
      </div>

      <button class="auth-btn" type="submit">Login</button>

      <div class="bottom-text">
        Don't have account? <a href="/signup/">Signup</a>
      </div>
    </form>
  </body>
</html>
