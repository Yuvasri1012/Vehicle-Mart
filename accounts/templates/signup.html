{% load static %}
<!doctype html>
<html>
  <head>
    <title>Signup</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}" />
  </head>
  <body>
    <form class="auth-container" method="POST" action="{% url 'do_signup' %}">
      {% csrf_token %}


      <!-- <a href="{% url 'home' %}" class="close-btn1">✖</a> -->

      <h2>Signup</h2>

  
      <div class="input-group">
        <label>Username</label>
        <input type="text" name="username" required />
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" name="email" required />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" required />
      </div>

      <div class="input-group">
        <label>Select Role</label>
        <select name="role" required>
          <option value="">Select Role</option>
          <option value="admin">Admin</option>
          <option value="user">User</option>
        </select>
      </div>

      <button class="auth-btn" type="submit">Signup</button>

      <div class="bottom-text">Already have account? <a href="/">Login</a></div>
    </form>
  </body>
</html>
